; ============================================================
; MicroROS Self-Balancing Robot — ESP32 WiFi Bridge
; PlatformIO configuration
; Role: UART ↔ WiFi UDP relay for microROS
; ROS2 agent target: Raspberry Pi 5 (IP stored in NVS)
; ============================================================

[platformio]
default_envs = esp32-bridge

[env:esp32-bridge]
platform    = espressif32
board       = esp32dev
framework   = arduino

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -Iinclude
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0

; WiFi + microROS
; AsyncUDP for non-blocking UDP socket
; Preferences for NVS credential storage
lib_deps =
    AsyncUDP

; No microROS library on ESP32 —
; ESP32 is a pure transport relay.
; STM32 is the microROS client, ESP32 bridges UART↔UDP only.

monitor_speed  = 115200
upload_protocol = esptool

; Optional: monitor_filters for cleaner serial output
monitor_filters = esp32_exception_decoder
