; ============================================================
; MicroROS Self-Balancing Robot — ESP32 WiFi Bridge
; PlatformIO configuration
; Role: UART ↔ WiFi UDP relay for microROS
; ROS2 agent target: Proxmox VM (10.10.8.110)
; ============================================================

[platformio]
default_envs = esp32-bridge

[env:esp32-bridge]
platform    = espressif32@6.7.0
board       = esp32dev
framework   = arduino

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder
