; ============================================================
; MicroROS Self-Balancing Robot — STM32F429I-DISC1
; PlatformIO configuration
; Board: STM32F429I Discovery (disco_f429zi)
; Framework: STM32Cube (HAL)
; ============================================================

[platformio]
default_envs = stm32f429

; ── Target: STM32F429I-DISC1 ─────────────────────────────────
[env:stm32f429]
platform          = ststm32
board             = disco_f429zi
framework         = stm32cube

; Include paths
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F429xx
    -DHSE_VALUE=8000000U
    -mfloat-abi=hard
    -mfpu=fpv4-sp-d16
    -O2
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Iinclude
    -Iinclude/config
    -Iinclude/imu
    -Iinclude/motor
    -Iinclude/pid
    -Iinclude/uros

; microROS: enabled automatically if libmicroros.a exists
; Build the library on the VM with: bash scripts/build_microros_lib.sh
; Then copy to lib/microros/
extra_scripts = pre:scripts/check_uros.py

upload_protocol   = stlink
debug_tool        = stlink
monitor_speed     = 115200

; ── Native unit test environment (runs on x86, no hardware) ──
[env:native]
platform    = native
build_flags =
    -DNATIVE_TEST
    -Iinclude
    -Iinclude/config
    -Iinclude/imu
    -Iinclude/motor
    -Iinclude/pid
    -std=c11
    -Wall

; Include only hardware-independent source files for native tests
build_src_filter = +<pid/> +<imu/imu_filter.c>
test_build_src = yes
