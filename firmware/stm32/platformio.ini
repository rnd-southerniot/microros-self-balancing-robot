; ============================================================
; MicroROS Self-Balancing Robot — STM32F429I-DISC1
; PlatformIO configuration
; Board: STM32F429I Discovery (disco_f429zi)
; Framework: STM32Cube (HAL)
; ============================================================

[platformio]
default_envs = stm32f429

; ── Target: STM32F429I-DISC1 ─────────────────────────────────
[env:stm32f429]
platform          = ststm32
board             = disco_f429zi
framework         = stm32cube

; All source lives in src/ — explicit to avoid PIO auto-globbing
src_dir           = src

; Include paths: project headers + STM32 HAL + CMSIS
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F429xx
    -O2
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Iinclude
    -Iinclude/config
    -Iinclude/imu
    -Iinclude/motor
    -Iinclude/pid
    -Iinclude/uros

; microROS static library for STM32 + FreeRTOS
; Use the pre-built utils from micro-ROS for STM32CubeMX
lib_deps =
    https://github.com/micro-ROS/micro_ros_stm32cubemx_utils.git

; Linker script — STM32F429 Flash layout
board_build.ldscript = STM32F429ZITX_FLASH.ld

upload_protocol   = stlink
debug_tool        = stlink
monitor_speed     = 115200

; ── Native unit test environment (runs on x86, no hardware) ──
[env:native]
platform    = native
src_dir     = test/native
build_flags =
    -DNATIVE_TEST
    -Iinclude
    -Iinclude/config
    -Iinclude/imu
    -Iinclude/motor
    -Iinclude/pid
    -std=c11
    -Wall

test_filter = native/*
